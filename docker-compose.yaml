
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      AIRFLOW_DB: ${AIRFLOW_DB}   # extra, harmless
    ports:
      - "5432:5432"
    volumes:
      - postgres_data2:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "/docker-entrypoint-initdb.d/02_checkval.sh"]
      interval: 5s
      timeout: 5s
      retries: 20

  airflow-web:
    image: apache/airflow:2.7.1
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB}
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AIRFLOW_DB: ${AIRFLOW_DB}
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: "admin"
      _AIRFLOW_WWW_USER_PASSWORD: "admin"
      _AIRFLOW_WWW_USER_FIRSTNAME: "YourFirstName"
      _AIRFLOW_WWW_USER_LASTNAME: "YourLastName"
      _AIRFLOW_WWW_USER_EMAIL: "admin@example.com"
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./start-airflow-web.sh:/start-airflow-web.sh
    depends_on:
      postgres:
        condition: service_healthy
    command: ["bash", "/start-airflow-web.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  airflow-scheduler:
    image: apache/airflow:2.7.1
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB}
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AIRFLOW_DB: ${AIRFLOW_DB}   
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./start-airflow-scheduler.sh:/start-airflow-scheduler.sh
    depends_on:
      postgres:
        condition: service_healthy
      airflow-web:
        condition: service_healthy
    command: ["bash", "/start-airflow-scheduler.sh"]

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.5.2
    working_dir: /usr/app/dbt
    env_file:
      - .env
    volumes:
      - ./dbt:/usr/app/dbt
    depends_on:
      - postgres
    entrypoint: ["sleep", "infinity"]

volumes:
  postgres_data2:
